# 数据源配置
sources:
  arxiv:
    enabled: true
    categories:
      # - cs.LG            # 机器学习
      - physics.flu-dyn  # 流体动力学
    max_results: 1000  # 每次抓取的最大论文数
    days_back: 180  # 抓取一定天数的论文

  # 语义搜索数据源（用自然语言描述替代关键词列表）
  semantic_scholar:
    enabled: true
    api_key: ""  # 免费 API key，申请: https://www.semanticscholar.org/product/api#api-key-form
    queries:
      - "deep learning for computational fluid dynamics simulation"
      - "physics-informed neural networks for fluid mechanics"
      - "machine learning accelerated CFD"
      - "data-driven turbulence modeling and closure"
      - "multiphase flow simulation with neural networks"
      - "aerodynamic optimization using deep learning"
      - "surrogate models for fluid dynamics"
      - "reduced order modeling for CFD"
      - "reinforcement learning for flow control"
      - "neural network based flow field prediction"
    max_results_per_query: 20
    days_back: 180

# 领域分类关键词
categories:
  多相流:
    keywords:
      - multiphase flow
      - two-phase flow
      - phase separation
      - LEVEL SET
      - VOF
      - Lattice Boltzmann
      - SPH
      - DEM
      
  空气动力学:
    keywords:
      - aerodynamics
      - aerodynamic optimization
      - flow around airfoil
      - airfoil simulation
      - wing aerodynamics
      - UAV aerodynamics
      - drag reduction
      - lift enhancement
      - FSI
      - fluid-structure interaction
      - aerospace CFD
      - mesh generation
      - adaptive mesh
      
  机器学习:
    keywords:
      - machine learning
      - deep learning
      - neural network
      - reinforcement learning
      - transfer learning
      - supervised learning
      - unsupervised learning
      - CNN
      - PINN
      - RNN
      - GAN
      - transformer
      - LSTM
      
  # 新增分类1：智能流体力学（流体+AI交叉，比CFD+ML更宽泛）
  智能流体力学:
    keywords:
      - intelligent fluid dynamics
      - AI-aided fluid simulation
      - AI-driven fluid mechanics
      - AI-enhanced fluid dynamics
      - fluid simulation with AI
      - AI for fluid mechanics
      - AI in fluid dynamics
      - fluid dynamics
      - machine learning
      - deep learning
      
  流体力学:
    keywords:
      - fluid dynamics
      - CFD
      - computational fluid dynamics
      - flow simulation
      - turbulence
      - RANS
      - LES
      - DNS
      - multiphase flow
      - two-phase flow
      - flow modeling
      - flow computation
      - mesh
      - finite volume
      - finite element
      - finite difference
      - adaptive mesh

  CFD与机器学习交叉:
    keywords:
      # 流体力学核心关键词（必含其一）
      - computational fluid dynamics
      - CFD
      - fluid mechanics
      - fluid dynamics
      - flow simulation
      - flow modeling
      - flow computation
      - turbulence
      - RANS
      - LES
      - DNS
      - multiphase flow
      - two-phase flow
      # ML/DL关键词（必含其一）
      - machine learning
      - deep learning
      - neural network
      - PINN
      - physics-informed neural network
      - data-driven modeling
      - surrogate model
      - reduced-order model
      - ROM
      - data-driven
      - LSTM
      - CNN
      - transformer
      - RNN
      - GAN
      - reinforcement learning
      - transfer learning
      - supervised learning
      - unsupervised learning

  # 顶级会议和期刊列表
venues:
  conferences:
    - NeurIPS
    - ICML
    - ICLR
    - CVPR
    - ICCV
    - ECCV
    - ACL
    - EMNLP
    - NAACL
    - AAAI
    - IJCAI
    - KDD
    - ICRA
    - IROS
    - AIAA SciTech Forum
    # (AIAA科技论坛,航空航天CFD顶会)
    - ASME Fluids Engineering Division Meeting
    # (ASME流体工程会议,流体力学顶会)
    - International Conference on Computational Fluid Dynamics (ICCFD)
    # (CFD领域旗舰会议)
    - International Conference on Numerical Methods in Fluid Dynamics
    # (NUMEFD,数值流体顶会)
    - International Symposium on Turbulence and Shear Flow Phenomena (TSFP)
    # (湍流/CFD核心会议)
    - Conference on Machine Learning for Fluid Dynamics (ML4FD)
    # (机器学习+CFD交叉顶会)
    - International Conference on Computational Mechanics (ICCM)
    # (计算力学,含CFD分支)
    - European Conference on Computational Fluid Dynamics (ECFD)
    # (欧洲CFD旗舰会议)

  journals:
    - Nature
    - Science
    - PAMI
    - JMLR
    - TPAMI
    - IJCV
    - Journal of Computational Physics (JCP)
    # （CFD数值方法顶刊，机器学习+CFD论文核心发表地）
    - Computers & Fluids
    # （CFD工程应用顶刊）
    - Journal of Fluid Mechanics (JFM)
    # （流体力学基础研究顶刊，含智能流体）
    - AIAA Journal
    # （航空航天CFD顶刊）
    - International Journal for Numerical Methods in Fluids (IJNMF)
    # （数值流体核心期刊）
    - Physics of Fluids
    # （流体物理顶刊，含湍流/智能流体）
    - Computational Mechanics
    # （计算力学，CFD交叉领域）
    - Journal of Machine Learning for Science and Technology
    # （机器学习+工程（含CFD）交叉期刊）
    - 航空学报
    # （中国航空航天CFD顶刊）
    - 计算力学学报
    # （中国计算力学顶刊，含CFD分支）
    - 流体力学学报
    # （中国流体力学顶刊）
    - 计算物理学报
    # （中国计算物理顶刊，含CFD分支）
    - 机械工程学报
    # （中国机械工程顶刊，含CFD应用）
    - 自动化学报
    # （中国自动化顶刊，含智能流体交叉）
    - 计算机学报
    # （中国计算机科学顶刊，含机器学习分支）
    - 力学学报
    # （中国力学顶刊，含流体力学分支）

# GitHub Pages 配置
output:
  data_dir: data
  docs_dir: docs
  papers_per_page: 50
  
# 调度配置（GitHub Actions）
schedule:
  cron: "0 0 * * *"  # 每天 UTC 0:00
  timezone: UTC
