# 数据源配置
sources:
  arxiv:
    enabled: true
    role: supplement  # Semantic Scholar 为主，arXiv 只补充近期预印本
    categories:
      # - cs.LG            # 机器学习
      - physics.flu-dyn  # 流体动力学
    max_results: 1000  # 每次抓取的最大论文数
    days_back: 30  # 抓取一定天数的论文

  # Crossref 数据源（正式发表论文元数据）
  crossref:
    enabled: true
    queries:
      physics_informed_learning:
        - "physics-informed neural networks fluid dynamics"
        - "PINN computational fluid dynamics"
      neural_operator_surrogate:
        - "neural operator computational fluid dynamics"
        - "Fourier neural operator fluid simulation"
      turbulence_modeling:
        - "machine learning turbulence closure RANS LES"
      aerodynamic_optimization:
        - "aerodynamic optimization machine learning"
      multiphase_flow:
        - "machine learning multiphase flow"
      numerical_methods:
        - "differentiable CFD solver neural"
    max_results_per_query: 20
    max_pages_per_query: 5
    stop_after_empty_pages: 1
    days_back: 30
    mailto: ""  # Crossref polite pool 邮箱 — 建议设置 CROSSREF_MAILTO 环境变量

  # OpenAlex 数据源（开放学术图谱）
  openalex:
    enabled: true
    queries:
      physics_informed_learning:
        - "physics-informed neural networks fluid dynamics"
        - "PINN CFD simulation"
      neural_operator_surrogate:
        - "neural operator CFD flow prediction"
        - "Fourier neural operator fluid"
      turbulence_modeling:
        - "machine learning turbulence modeling RANS"
      aerodynamic_optimization:
        - "aerodynamic optimization machine learning"
      multiphase_flow:
        - "machine learning multiphase flow interface"
      numerical_methods:
        - "differentiable solver CFD neural"
    max_results_per_query: 20
    max_pages_per_query: 5
    stop_after_empty_pages: 1
    days_back: 30
    mailto: ""  # OpenAlex polite pool 邮箱 — 建议设置 CROSSREF_MAILTO 环境变量

  # Google Scholar 数据源（使用 scholarly 库）
  google_scholar:
    enabled: true
    queries:
      pinn_fluid:
        - "physics-informed neural networks fluid dynamics"
        - "PINN computational fluid dynamics flow simulation"
      neural_operator_cfd:
        - "neural operator CFD flow field prediction"
        - "Fourier neural operator fluid simulation"
      turbulence_ml:
        - "machine learning turbulence modeling RANS LES"
        - "data-driven turbulence closure model"
      flow_control_rl:
        - "reinforcement learning flow control CFD"
        - "deep reinforcement learning drag reduction"
      surrogate_cfd:
        - "surrogate model CFD flow prediction"
        - "deep learning aerodynamic optimization"
      multiphase_ml:
        - "machine learning multiphase flow prediction"
        - "neural network interface capturing"
    max_results_per_query: 10
    max_pages_per_query: 3
    stop_after_empty_pages: 1
    # year_from: 留空则自动使用当前年份（无需每年手动更新）
    # year_from: 2026

  # CNKI 知网数据源（中文论文）
  cnki:
    enabled: true
    # CNKI 代理 URL — 必须通过环境变量 CNKI_HOME_URL / CNKI_KNS_BASE_URL 配置
    # 本地开发请在终端设置：
    #   export CNKI_HOME_URL="your-proxy-url"
    #   export CNKI_KNS_BASE_URL="your-proxy-url"
    home_url: ""
    kns_base_url: ""
    enrich_details: true
    detail_delay: 1.0
    queries:
      - "计算流体力学 机器学习"
      - "物理信息神经网络 流体力学"
      - "深度学习 湍流模拟"
      - "代理模型 流场预测"
      - "神经网络 流体力学 数值模拟"
      - "流场重建 数据驱动"
      - "强化学习 流动控制"
      - "气动优化 深度学习"
      - "格子玻尔兹曼 机器学习"
      - "多相流 数值模拟 深度学习"
    max_results_per_query: 20

  # 语义搜索数据源（用自然语言描述替代关键词列表）
  # Wanfang Data Chinese literature source.
  wanfang:
    enabled: true
    search_url: "https://s.wanfangdata.com.cn/paper"
    query_param: "q"
    max_results_per_query: 8
    days_back: 365
    enrich_details: true
    use_browser: true
    detail_delay: 0.3
    delay: 1.0
    queries:
      - "计算流体力学 机器学习"
      - "物理信息神经网络 流体力学"
      - "深度学习 湍流模拟"
      - "代理模型 流场预测"
      - "强化学习 流动控制"

  # CQVIP/VIP Chinese literature source.
  cqvip:
    enabled: true
    search_url: "https://www.cqvip.com/search"
    query_param: "k"
    max_results_per_query: 8
    days_back: 365
    enrich_details: true
    use_browser: true
    detail_delay: 0.3
    delay: 1.0
    queries:
      - "计算流体力学 机器学习"
      - "物理信息神经网络 流体力学"
      - "深度学习 湍流模拟"
      - "代理模型 流场预测"
      - "强化学习 流动控制"

  semantic_scholar:
    enabled: true
    api_key: ""  # 留空则使用环境变量 SEMANTIC_SCHOLAR_API_KEY
                # 免费 API key 申请: https://www.semanticscholar.org/product/api#api-key-form
                # 有 key 时速率限制 1000 req/5min，无 key 时 100 req/5min
    queries:
      physics_informed_learning:
        - "physics-informed neural networks fluid dynamics Navier-Stokes"
        - "PINN computational fluid dynamics flow simulation"
      neural_operator_surrogate:
        - "neural operator computational fluid dynamics flow field prediction"
        - "Fourier neural operator Navier-Stokes fluid simulation"
        - "surrogate model CFD parametric flow simulation"
      reduced_order_modeling:
        - "reduced order modeling CFD flow field prediction"
        - "autoencoder reduced-order model fluid dynamics"
      turbulence_modeling:
        - "machine learning turbulence closure RANS LES"
        - "data-driven turbulence modeling Reynolds stress eddy viscosity"
        - "subgrid scale model LES machine learning turbulence"
      aerodynamic_optimization:
        - "aerodynamic optimization airfoil wing drag reduction machine learning"
        - "reinforcement learning active flow control drag reduction"
      multiphase_flow:
        - "machine learning multiphase flow two-phase flow interface capturing"
        - "neural network phase field lattice Boltzmann multiphase flow"
      numerical_methods:
        - "learned numerical scheme computational fluid dynamics finite volume"
        - "differentiable CFD neural solver Navier-Stokes"
      uncertainty_inverse:
        - "uncertainty quantification CFD surrogate model fluid dynamics"
        - "data assimilation inverse problem fluid dynamics machine learning"
    max_results_per_query: 20
    max_pages_per_query: 5
    stop_after_empty_pages: 1
    days_back: 30

  # ScienceDirect (Elsevier) 数据源 — 学校图书馆网络浏览器抓取
  sciencedirect:
    enabled: true
    local_only: true
    use_browser: true
    max_results_per_query: 20
    days_back: 30
    queries:
      physics_informed_learning:
        - "physics-informed neural networks fluid dynamics"
        - "PINN computational fluid dynamics"
      neural_operator_surrogate:
        - "neural operator computational fluid dynamics"
        - "Fourier neural operator fluid simulation"
      turbulence_modeling:
        - "machine learning turbulence closure RANS LES"
        - "data-driven turbulence modeling"
      aerodynamic_optimization:
        - "aerodynamic optimization machine learning"
      multiphase_flow:
        - "machine learning multiphase flow"
      numerical_methods:
        - "differentiable CFD solver neural"

  # Web of Science / SCI 数据源 — 本地图书馆网络浏览器抓取，或 Clarivate API key
  webofscience:
    enabled: true
    local_only: true
    use_browser: true
    # 若学校/个人有 Clarivate API 权限，可设置环境变量 WOS_API_KEY / WEB_OF_SCIENCE_API_KEY
    # api_key: ""
    # api_url: "https://api.clarivate.com/apis/wos-starter/v1/documents"
    # query_param: "q"
    max_results_per_query: 20
    days_back: 30
    delay: 1.5
    queries:
      physics_informed_learning:
        - "physics-informed neural networks fluid dynamics"
        - "PINN computational fluid dynamics"
      neural_operator_surrogate:
        - "neural operator computational fluid dynamics"
        - "Fourier neural operator fluid simulation"
      turbulence_modeling:
        - "machine learning turbulence closure RANS LES"
        - "data-driven turbulence modeling"
      aerodynamic_optimization:
        - "aerodynamic optimization machine learning"
      multiphase_flow:
        - "machine learning multiphase flow"
      numerical_methods:
        - "differentiable CFD solver neural"

