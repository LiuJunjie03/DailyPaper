# GitHub Pages 配置
output:
  data_dir: data
  docs_dir: docs
  papers_per_page: 50

# PDF 全文补全（需本地 Chrome + 学校网络/VPN — 默认关闭）
pdf_enrich:
  enabled: false                # 本地手动运行时设为 true
  max_papers: 20                # 单次最多补多少篇
  delay_seconds: 1.5            # 每篇间隔（秒）
  skip_if_any_pdf: true         # true=已有任一 PDF 跳过；false=只跳过正式 pdf_url
  
# 调度配置（GitHub Actions）
schedule:
  cron: "0 0 * * *"  # 每天 UTC 0:00
  timezone: UTC
