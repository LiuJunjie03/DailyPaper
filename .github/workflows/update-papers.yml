name: Update Papers Daily

on:
  # 每天 UTC 0:00 自动运行
  schedule:
    - cron: '0 0 * * *'

  # 支持手动触发
  workflow_dispatch:
    inputs:
      start_month:
        description: 'Backfill start month (YYYY-MM), optional'
        required: false
        type: string
      end_month:
        description: 'Backfill end month (YYYY-MM), optional'
        required: false
        type: string

concurrency:
  group: update-papers-${{ github.ref }}
  cancel-in-progress: false

  # Push 到 main 分支时触发
  # push:
    # branches:
      # - main

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: pytest -q

    - name: Validate existing data
      run: python scripts/validate_data.py

    - name: Fetch papers
      env:
        SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        ENABLE_CNKI: "false"
        START_MONTH: ${{ github.event.inputs.start_month }}
        END_MONTH: ${{ github.event.inputs.end_month }}
      run: |
        if [ -n "$START_MONTH" ] || [ -n "$END_MONTH" ]; then
          start="${START_MONTH:-2024-01}"
          end="${END_MONTH:-$(date -u +%Y-%m)}"
          current="$start"
          while [ "$(date -u -d "$current-01" +%Y%m)" -le "$(date -u -d "$end-01" +%Y%m)" ]; do
            echo "Fetching month $current"
            python scripts/fetch_papers.py --month "$current"
            current="$(date -u -d "$current-01 +1 month" +%Y-%m)"
          done
        else
          python scripts/fetch_papers.py
        fi

    - name: Update venue info
      run: |
        python scripts/update_venue.py
      continue-on-error: true

    - name: Validate fetched data
      run: python scripts/validate_data.py

    - name: Generate HTML
      run: |
        python scripts/generate_html.py

    - name: Commit and push if changed
      run: |
        git config --local user.name 'github-actions[bot]'
        git config --local user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/ docs/
        if ! git diff --staged --quiet; then
          git commit -m "Auto update papers - $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
        else
          echo "No changes to commit"
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: gh-pages
        force_orphan: true

    - name: Notify on failure
      if: failure()
      run: |
        echo "::error::Daily paper update failed. Check the workflow logs for details."
